name: CI Pipeline

on:
  push:
    branches: [ main, develop ]    # main 또는 develop에 push 시
  pull_request:
    branches: [ main, develop ]    # PR 생성/업데이트 시

jobs:
  # ── Job 1: 백엔드 빌드 & 테스트 ──
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: Java 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Maven 빌드 & 테스트
        run: |
          cd backend
          ./mvnw clean package -DskipTests

  # ── Job 2: 프론트엔드 빌드 ──
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js 18 설정
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 의존성 설치 & 빌드
        run: |
          cd Cap2026/frontend
          npm install
          npm run build
